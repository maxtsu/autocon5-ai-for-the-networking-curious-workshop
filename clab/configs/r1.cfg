# r1 — border router, AS 65001 (internal)
# OSPF + iBGP to r2, eBGP to r3
#
# Status: draft. Verified at deploy time (Step 8).

# ============================================================================
# Interfaces
# ============================================================================

# Loopback 0 — used for router-id and iBGP peering source
set / interface lo0 subinterface 0 admin-state enable
set / interface lo0 subinterface 0 ipv4 admin-state enable
set / interface lo0 subinterface 0 ipv4 address 10.0.0.1/32

# Loopback 1 — represents an "internal" subnet to advertise via BGP
set / interface lo1 subinterface 0 admin-state enable
set / interface lo1 subinterface 0 ipv4 admin-state enable
set / interface lo1 subinterface 0 ipv4 address 10.10.0.1/24

# Link to r2 (internal AS link)
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.12.1/30

# Link to r3 (external eBGP)
set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.13.1/30

# ============================================================================
# Network-instance "default" (the default VRF)
# ============================================================================

set / network-instance default type default
set / network-instance default admin-state enable
set / network-instance default router-id 10.0.0.1
set / network-instance default interface lo0.0
set / network-instance default interface lo1.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

# ============================================================================
# Routing policy: a permissive "permit-all" used by both BGP groups
# ============================================================================

set / routing-policy policy permit-all default-action policy-result accept

# ============================================================================
# OSPF — runs only on the internal r1↔r2 link, plus loopbacks (passive)
# ============================================================================

set / network-instance default protocols ospf instance default admin-state enable
set / network-instance default protocols ospf instance default version ospf-v2
set / network-instance default protocols ospf instance default router-id 10.0.0.1
set / network-instance default protocols ospf instance default area 0.0.0.0 interface lo0.0 passive true
set / network-instance default protocols ospf instance default area 0.0.0.0 interface lo1.0 passive true
set / network-instance default protocols ospf instance default area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point

# ============================================================================
# BGP — AS 65001, with iBGP to r2 and eBGP to r3
# ============================================================================

set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 65001
set / network-instance default protocols bgp router-id 10.0.0.1
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable

# iBGP peer group — peers within AS 65001, sourced from loopback
set / network-instance default protocols bgp group ibgp-65001 peer-as 65001
set / network-instance default protocols bgp group ibgp-65001 transport local-address 10.0.0.1
set / network-instance default protocols bgp group ibgp-65001 afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp group ibgp-65001 export-policy [permit-all]
set / network-instance default protocols bgp group ibgp-65001 import-policy [permit-all]

# iBGP neighbor: r2
set / network-instance default protocols bgp neighbor 10.0.0.2 peer-group ibgp-65001

# eBGP peer group — for external peers in different ASes
set / network-instance default protocols bgp group ebgp-r3 peer-as 65002
set / network-instance default protocols bgp group ebgp-r3 afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp group ebgp-r3 export-policy [permit-all]
set / network-instance default protocols bgp group ebgp-r3 import-policy [permit-all]

# eBGP neighbor: r3
set / network-instance default protocols bgp neighbor 10.1.13.2 peer-group ebgp-r3

