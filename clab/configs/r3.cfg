# r3 — external eBGP peer, AS 65002
# eBGP to r1; advertises RFC 5737 documentation prefixes
#
# Status: draft. Verified at deploy time (Step 8).
# Note: the static-route + export-policy pattern below may need
# syntactic adjustment against the real SR Linux 25.10.2 image.

# ============================================================================
# Interfaces
# ============================================================================

# Loopback — router-id and stable identity
set / interface lo0 subinterface 0 admin-state enable
set / interface lo0 subinterface 0 ipv4 admin-state enable
set / interface lo0 subinterface 0 ipv4 address 10.0.0.3/32

# Link to r1 (eBGP)
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.13.2/30

# ============================================================================
# Network-instance "default"
# ============================================================================

set / network-instance default type default
set / network-instance default admin-state enable
set / network-instance default router-id 10.0.0.3
set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0

# ============================================================================
# Static routes — the "external" prefixes r3 advertises via eBGP
# Using RFC 5737 documentation address blocks (canonical "fake internet" space)
# ============================================================================

# Blackhole next-hop-group: prefixes are advertised but packets get dropped
# (these are demo prefixes, not real reachable destinations)
set / network-instance default next-hop-groups group blackhole blackhole generate-icmp false

# Three RFC 5737 documentation prefixes
set / network-instance default static-routes route 192.0.2.0/24 next-hop-group blackhole
set / network-instance default static-routes route 198.51.100.0/24 next-hop-group blackhole
set / network-instance default static-routes route 203.0.113.0/24 next-hop-group blackhole

# ============================================================================
# Routing policies
# ============================================================================

# Export policy: only advertise static-origin routes (the three /24s above)
set / routing-policy policy export-statics statement 10 match protocol static
set / routing-policy policy export-statics statement 10 action policy-result accept

# Import policy: accept everything r1 sends us (kept permissive for demo)
set / routing-policy policy permit-all default-action policy-result accept

# ============================================================================
# BGP — AS 65002, eBGP to r1
# ============================================================================

set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 65002
set / network-instance default protocols bgp router-id 10.0.0.3
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable

# eBGP peer group (peer in AS 65001)
set / network-instance default protocols bgp group ebgp-r1 peer-as 65001
set / network-instance default protocols bgp group ebgp-r1 afi-safi ipv4-unicast admin-state enable

# eBGP neighbor: r1's ethernet-1/2 IP
# ============================================================================
# KNOWN ISSUE: SR Linux 25.10 + containerlab silently drops this neighbor
# declaration during the bulk startup-config push. The line is syntactically
# valid — the same syntax works on r1.cfg — but in r3's specific context it
# never lands. Workaround documented in Lab 3 Step 5: apply the line live
# via 'enter candidate / set / commit now' on r3 after deploy.
#
# Keeping the line here for documentation and future-fix tracking — if a
# later SR Linux release pushes it cleanly, the Lab 3 step becomes a no-op
# and we can simplify.
# ============================================================================
set / network-instance default protocols bgp neighbor 10.1.13.1 peer-group ebgp-r1
set / network-instance default protocols bgp group ebgp-r1 export-policy [export-statics]
set / network-instance default protocols bgp group ebgp-r1 import-policy [permit-all]

